<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataFlow - Friend View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 24px; color: #1a202c; margin-bottom: 4px; }
        .sub { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .battery-wrapper {
            position: relative;
            width: 120px;
            height: 300px;
            background: #f3f4f6;
            border-radius: 20px;
            border: 5px solid #1a202c;
            overflow: hidden;
            margin: 20px auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .battery-cap {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 12px;
            background: #1a202c;
            border-radius: 6px 6px 0 0;
        }
        .battery-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0%;
            transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 0 14px 14px;
        }
        .battery-fill.red { background: linear-gradient(180deg, #f87171, #dc2626); }
        .battery-fill.yellow { background: linear-gradient(180deg, #fbbf24, #d97706); }
        .battery-fill.green { background: linear-gradient(180deg, #34d399, #059669); }
        .battery-fill.stars { background: linear-gradient(180deg, #fcd34d, #f59e0b); animation: glow 1.5s infinite alternate; }
        @keyframes glow {
            0% { box-shadow: inset 0 0 20px rgba(251, 191, 36, 0.3); }
            100% { box-shadow: inset 0 0 40px rgba(251, 191, 36, 0.6); }
        }
        .stars-emoji { font-size: 36px; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .battery-percentage { font-size: 52px; font-weight: 800; color: #1a202c; margin: 8px 0 4px; }
        .percent-sign { font-size: 24px; color: #6b7280; }
        .battery-label { font-size: 18px; font-weight: 600; color: #1a202c; }
        .battery-sub { font-size: 14px; color: #6b7280; margin-top: 4px; }
        .last-updated { font-size: 12px; color: #9ca3af; margin-top: 16px; }
        .refresh-btn {
            margin-top: 20px;
            padding: 12px 40px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s;
        }
        .refresh-btn:active { transform: scale(0.95); }
        .friend-name {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
        }
        .friend-name strong { color: #1a202c; }
        .status-text {
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
        }
        .status-text.red { color: #dc2626; background: #fef2f2; }
        .status-text.yellow { color: #d97706; background: #fffbeb; }
        .status-text.green { color: #059669; background: #ecfdf5; }
        .status-text.stars { color: #d97706; background: #fffbeb; }
        .loading { color: #9ca3af; padding: 40px; }
        .error { color: #dc2626; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 DataFlow</h1>
        <div class="sub">Accountability Partner View</div>
        
        <div id="content">
            <div class="loading">🔄 Loading friend's progress...</div>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION - EDIT THESE
        // ============================================================
        const GITHUB_USERNAME = 'YOUR_GITHUB_USERNAME';
        const GITHUB_REPO = 'dataflow-share';
        const DATA_FILE = 'data.json';
        const FRIEND_NAME = 'yourName'; // The name of the person you're tracking

        // ============================================================
        // LOAD DATA FROM GITHUB
        // ============================================================
        function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">🔄 Loading...</div>';

            fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${DATA_FILE}`)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.json();
                })
                .then(data => {
                    const userData = data.users[FRIEND_NAME];
                    if (!userData) {
                        content.innerHTML = `<div class="error">❌ No data found for "${FRIEND_NAME}"</div>`;
                        return;
                    }
                    renderBattery(userData);
                    document.getElementById('lastUpdated').textContent = 
                        `📅 Last updated: ${new Date(userData.lastUpdated).toLocaleString()}`;
                })
                .catch(error => {
                    content.innerHTML = `
                        <div class="error">❌ Error loading data: ${error.message}<br>
                        <small>Make sure the repository and file exist.</small></div>
                    `;
                });
        }

        // ============================================================
        // RENDER BATTERY
        // ============================================================
        function renderBattery(userData) {
            const percent = userData.batteryPercent || 0;
            const sheetName = userData.sheetName || 'Unknown';
            
            let colorClass = 'red';
            let statusText = '🔴 Needs attention';
            let statusClass = 'red';
            let starsHTML = '';

            if (percent >= 100) {
                colorClass = 'stars';
                statusText = '⭐🌟✨ 100% Complete! 🎉';
                statusClass = 'stars';
                starsHTML = '<span class="stars-emoji">⭐</span>';
            } else if (percent >= 70) {
                colorClass = 'green';
                statusText = '🚀 Great progress!';
                statusClass = 'green';
            } else if (percent >= 30) {
                colorClass = 'yellow';
                statusText = '💪 Keep going!';
                statusClass = 'yellow';
            } else {
                colorClass = 'red';
                statusText = '📚 Just getting started';
                statusClass = 'red';
            }

            const html = `
                <div class="friend-name">👤 <strong>${FRIEND_NAME}</strong> is working on</div>
                <div class="battery-wrapper">
                    <div class="battery-cap"></div>
                    <div class="battery-fill ${colorClass}" style="height: ${percent}%;">
                        ${starsHTML}
                    </div>
                </div>
                <div class="battery-percentage">${percent}<span class="percent-sign">%</span></div>
                <div class="battery-label">${sheetName}</div>
                <div class="battery-sub">${userData.batteryPercent || 0}% complete</div>
                <div class="status-text ${statusClass}">${statusText}</div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        // ============================================================
        // AUTO-LOAD ON START
        // ============================================================
        loadData();

        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
