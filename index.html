<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DataFlow</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js">
    </script>
    <style>
        /* ... (previous styles remain the same) ... */
        
        /* LOGIN SCREEN */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0f;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        .login-overlay.hidden {
            display: none;
        }
        .login-box {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a4e;
        }
        .login-box h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 4px;
        }
        .login-box .subtitle {
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .login-box .login-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .login-box .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .login-box .form-group label {
            color: #9ca3af;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #2a2a4e;
            border-radius: 10px;
            background: #0a0a1a;
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box .form-group input:focus {
            border-color: #4f46e5;
        }
        .login-box .form-group input::placeholder {
            color: #4a4a6a;
        }
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .login-box .btn-login:active {
            transform: scale(0.95);
        }
        .login-box .btn-login:hover {
            background: #6366f1;
        }
        .login-box .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .login-box .login-toggle {
            color: #6b7280;
            font-size: 13px;
            margin-top: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .login-box .login-toggle:hover {
            color: #9ca3af;
        }
        .login-box .login-toggle span {
            color: #4f46e5;
            font-weight: 600;
        }
        .login-box .error-msg {
            color: #f87171;
            font-size: 12px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .success-msg {
            color: #34d399;
            font-size: 12px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .github-setup-hint {
            background: #0a0a1a;
            border-radius: 8px;
            padding: 10px;
            margin: 12px 0;
            text-align: left;
        }
        .login-box .github-setup-hint p {
            color: #6b7280;
            font-size: 11px;
            margin: 2px 0;
        }
        .login-box .github-setup-hint code {
            color: #fbbf24;
            background: #1a1a2e;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
        }
        .login-box .github-setup-hint .hint-title {
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        /* ... (rest of previous styles) ... */
    </style>
</head>
<body>

    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-emoji">📊</div>
            <h1>DataFlow</h1>
            <div class="subtitle" id="loginSubtitle">Sync your progress across devices</div>
            
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="loginUserID" placeholder="Your unique username" />
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Your password" />
            </div>
            
            <div class="github-setup-hint" id="githubHint">
                <div class="hint-title">🔑 GitHub Setup Required</div>
                <p>1. Create a <code>public</code> GitHub repository</p>
                <p>2. Create a <code>data.json</code> file in it</p>
                <p>3. Get a <code>Personal Access Token</code> (repo scope)</p>
                <p style="margin-top:4px;color:#4f46e5;font-size:10px;">Settings → GitHub Sync to configure</p>
            </div>
            
            <div class="error-msg" id="loginError"></div>
            <div class="success-msg" id="loginSuccess"></div>
            
            <button class="btn-login" id="loginBtn" onclick="handleLogin()">🔓 Sign In</button>
            
            <div class="login-toggle" onclick="toggleLoginMode()">
                Don't have an account? <span id="toggleText">Create one</span>
            </div>
        </div>
    </div>

    <!-- APP WRAPPER -->
    <div class="app-wrapper" id="appWrapper">
        <!-- ... (rest of the app remains the same) ... -->
    </div>

    <!-- ... (rest of the HTML remains the same) ... -->

    <script>
        // ============================================================
        // AUTHENTICATION SYSTEM
        // ============================================================
        let authMode = 'login'; // 'login' or 'signup'
        let authUserID = '';
        let authPassword = '';

        function toggleLoginMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            const btn = document.getElementById('loginBtn');
            const toggle = document.getElementById('toggleText');
            const subtitle = document.getElementById('loginSubtitle');
            
            if (authMode === 'login') {
                btn.textContent = '🔓 Sign In';
                toggle.textContent = 'Create one';
                subtitle.textContent = 'Sign in to sync your progress across devices';
            } else {
                btn.textContent = '🔐 Create Account';
                toggle.textContent = 'Sign in instead';
                subtitle.textContent = 'Create an account to save your progress in the cloud';
            }
            
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginSuccess').textContent = '';
        }

        function handleLogin() {
            const userID = document.getElementById('loginUserID').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!userID || !password) {
                document.getElementById('loginError').textContent = '⚠️ Please fill in all fields';
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginSuccess').textContent = '';
            
            if (authMode === 'login') {
                // Try to login - check if user exists in GitHub
                checkUserExists(userID, password)
                    .then(exists => {
                        if (exists) {
                            loginSuccess(userID, password);
                        } else {
                            document.getElementById('loginError').textContent = '❌ User not found. Please sign up first.';
                            btn.disabled = false;
                            btn.textContent = '🔓 Sign In';
                        }
                    })
                    .catch(err => {
                        document.getElementById('loginError').textContent = '❌ ' + err.message;
                        btn.disabled = false;
                        btn.textContent = '🔓 Sign In';
                    });
            } else {
                // Sign up - create new user
                createUser(userID, password)
                    .then(success => {
                        if (success) {
                            document.getElementById('loginSuccess').textContent = '✅ Account created! Logging in...';
                            setTimeout(() => {
                                loginSuccess(userID, password);
                            }, 1000);
                        }
                    })
                    .catch(err => {
                        document.getElementById('loginError').textContent = '❌ ' + err.message;
                        btn.disabled = false;
                        btn.textContent = '🔐 Create Account';
                    });
            }
        }

        function checkUserExists(userID, password) {
            return new Promise((resolve, reject) => {
                const g = appData.github;
                if (!g.username || !g.repo || !g.token) {
                    reject(new Error('GitHub not configured. Please set up GitHub in Settings first.'));
                    return;
                }
                
                fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                    headers: { 'Authorization': `token ${g.token}` }
                })
                .then(response => {
                    if (response.status === 404) {
                        resolve(false);
                        return;
                    }
                    if (!response.ok) throw new Error('Failed to check user');
                    return response.json();
                })
                .then(fileData => {
                    if (!fileData) { resolve(false); return; }
                    try {
                        const content = JSON.parse(atob(fileData.content));
                        if (content.users && content.users[userID]) {
                            // Check password (stored as hash)
                            const storedHash = content.users[userID].password || '';
                            // Simple check - in production use proper hashing
                            if (storedHash === btoa(password) || !storedHash) {
                                // If no password stored yet, set it
                                if (!storedHash) {
                                    // Update with password
                                    updateUserPassword(userID, password, fileData.sha, content);
                                }
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        } else {
                            resolve(false);
                        }
                    } catch (e) {
                        resolve(false);
                    }
                })
                .catch(err => reject(err));
            });
        }

        function createUser(userID, password) {
            return new Promise((resolve, reject) => {
                const g = appData.github;
                if (!g.username || !g.repo || !g.token) {
                    reject(new Error('GitHub not configured. Please set up GitHub in Settings first.'));
                    return;
                }
                
                fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                    headers: { 'Authorization': `token ${g.token}` }
                })
                .then(response => {
                    if (response.status === 404) {
                        // Create new file
                        return createNewUserFile(userID, password);
                    }
                    if (!response.ok) throw new Error('Failed to check');
                    return response.json();
                })
                .then(fileData => {
                    if (fileData && fileData.content) {
                        // Update existing file
                        return updateExistingFile(fileData, userID, password);
                    }
                    resolve(true);
                })
                .catch(err => {
                    if (err.message === 'File not found') {
                        return createNewUserFile(userID, password);
                    }
                    reject(err);
                });
            });
        }

        function createNewUserFile(userID, password) {
            const g = appData.github;
            const data = {
                users: {
                    [userID]: {
                        password: btoa(password),
                        sheets: [],
                        history: [],
                        defaultSpeed: 3,
                        dateSpeedOverrides: {},
                        dateNotes: {},
                        taskAllocations: {},
                        priorities: {},
                        lastUpdated: new Date().toISOString()
                    }
                }
            };
            
            return fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${g.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Create user ${userID}`,
                    content: btoa(JSON.stringify(data, null, 2))
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to create user');
                return true;
            });
        }

        function updateExistingFile(fileData, userID, password) {
            const g = appData.github;
            let content = JSON.parse(atob(fileData.content));
            
            if (!content.users) content.users = {};
            
            // Check if user exists
            if (content.users[userID]) {
                // Update password if needed
                if (!content.users[userID].password) {
                    content.users[userID].password = btoa(password);
                }
                return true;
            }
            
            // Create new user
            content.users[userID] = {
                password: btoa(password),
                sheets: [],
                history: [],
                defaultSpeed: 3,
                dateSpeedOverrides: {},
                dateNotes: {},
                taskAllocations: {},
                priorities: {},
                lastUpdated: new Date().toISOString()
            };
            
            return fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${g.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Add user ${userID}`,
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha: fileData.sha
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to update');
                return true;
            });
        }

        function updateUserPassword(userID, password, sha, content) {
            const g = appData.github;
            if (!content.users) content.users = {};
            if (!content.users[userID]) content.users[userID] = {};
            content.users[userID].password = btoa(password);
            
            return fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${g.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Update password for ${userID}`,
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha: sha
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to update password');
                return true;
            });
        }

        function loginSuccess(userID, password) {
            authUserID = userID;
            authPassword = password;
            appData.github.userID = userID;
            saveData();
            
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('loginSuccess').textContent = '✅ Logged in as ' + userID;
            
            // Load user data
            loadUserData(userID);
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.textContent = '🔓 Sign In';
            
            showToast('✅ Welcome back, ' + userID + '!');
        }

        function loadUserData(userID) {
            const g = appData.github;
            if (!g.username || !g.repo || !g.token) {
                showToast('⚠️ GitHub not configured. Please set up in Settings.');
                return;
            }
            
            fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${g.token}` }
            })
            .then(response => response.json())
            .then(fileData => {
                if (fileData && fileData.content) {
                    const data = JSON.parse(atob(fileData.content));
                    if (data.users && data.users[userID]) {
                        const userData = data.users[userID];
                        // Load user data into app
                        appData.sheets = userData.sheets || [];
                        appData.history = userData.history || [];
                        appData.defaultSpeed = userData.defaultSpeed || 3;
                        appData.dateSpeedOverrides = userData.dateSpeedOverrides || {};
                        appData.dateNotes = userData.dateNotes || {};
                        appData.taskAllocations = userData.taskAllocations || {};
                        appData.priorities = userData.priorities || {};
                        
                        // Re-allocate tasks if needed
                        appData.sheets.forEach(sheet => {
                            if (!appData.taskAllocations[sheet.name] || 
                                Object.keys(appData.taskAllocations[sheet.name]).length === 0) {
                                appData.taskAllocations[sheet.name] = allocateTasksToDates(sheet);
                            }
                        });
                        
                        saveData();
                        updateAllSelectors();
                        updateFocusDashboard();
                        updateSheetTabs();
                        renderSpreadsheet();
                        updateFocusBattery();
                        updateHistory();
                        updateDateDisplay();
                        updateThreeBatteries();
                        updateHorizBatteries();
                        updateStatusDot();
                        
                        showToast('📂 Loaded data for ' + userID);
                    }
                }
            })
            .catch(err => {
                console.error('Error loading user data:', err);
            });
        }

        // ============================================================
        // OVERRIDE SYNC TO USE USER ID
        // ============================================================
        const originalSyncToGitHub = syncToGitHub;
        
        // Override sync function to use user-specific data
        syncToGitHub = function() {
            const g = appData.github;
            if (!g.username || !g.repo || !g.token) {
                showToast('⚠️ Please configure GitHub settings first (Settings → GitHub Sync)');
                return;
            }
            
            const userID = authUserID || g.userID || 'user';
            
            const dot = document.getElementById('githubDot');
            const text = document.getElementById('githubStatusText');
            if (dot) { dot.className = 'dot syncing';
                text.textContent = 'Syncing...'; }
            
            const sheetsData = appData.sheets.map(sheet => {
                const totalItems = sheet.data.length;
                const permanentlyCompleted = appData.history.filter(h =>
                    h.sheetName === sheet.name && h.permanent === true
                ).length;
                const percent = totalItems > 0 ? Math.round((permanentlyCompleted / totalItems) * 100) : 0;
                const allocations = appData.taskAllocations[sheet.name] || {};
                return {
                    sheetName: sheet.name,
                    batteryPercent: percent,
                    totalItems: totalItems,
                    completedItems: permanentlyCompleted,
                    speed: sheet.speed || appData.defaultSpeed,
                    startDate: sheet.startDate || new Date().toISOString().split('T')[0],
                    targetDate: sheet.targetDate || '',
                    priority: appData.priorities[sheet.name] || 1,
                    allocations: allocations,
                    lastUpdated: new Date().toISOString()
                };
            });
            
            const historyData = appData.history.filter(h => h.permanent === true).map(h => ({
                date: h.date,
                sheetName: h.sheetName,
                taskRef: h.taskRef,
                taskDuration: h.taskDuration,
                taskIndex: h.taskIndex,
                timestamp: h.timestamp,
                completedDate: h.completedDate || h.date
            }));
            
            const data = {
                users: {}
            };
            
            // Get existing data first
            fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${g.token}` }
            })
            .then(response => {
                if (response.status === 404) {
                    return null;
                }
                if (!response.ok) throw new Error('Failed to read file');
                return response.json();
            })
            .then(fileData => {
                let sha = null;
                let existingData = {};
                
                if (fileData && fileData.content) {
                    sha = fileData.sha;
                    try {
                        existingData = JSON.parse(atob(fileData.content));
                        data.users = existingData.users || {};
                    } catch (e) {}
                }
                
                // Update user data
                data.users[userID] = {
                    password: (data.users[userID] && data.users[userID].password) || btoa(''),
                    sheets: sheetsData,
                    history: historyData,
                    defaultSpeed: appData.defaultSpeed,
                    dateSpeedOverrides: appData.dateSpeedOverrides || {},
                    dateNotes: appData.dateNotes || {},
                    taskAllocations: appData.taskAllocations || {},
                    priorities: appData.priorities || {},
                    lastUpdated: new Date().toISOString()
                };
                
                const updatedContent = btoa(JSON.stringify(data, null, 2));
                const body = {
                    message: `Update data for ${userID} - ${new Date().toLocaleString()}`,
                    content: updatedContent,
                    sha: sha
                };
                
                return fetch(`https://api.github.com/repos/${g.username}/${g.repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${g.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
            })
            .then(response => {
                if (response && !response.ok) throw new Error('Failed to upload');
                if (dot) { dot.className = 'dot online';
                    text.textContent = '✅ Synced!'; }
                appData.lastSync = new Date().toISOString();
                document.getElementById('lastSyncTime').textContent = new Date().toLocaleString();
                saveData();
                setTimeout(() => updateGitHubStatus(), 3000);
                showToast(`✅ Synced ${appData.sheets.length} sheets and ${appData.history.filter(h=>h.permanent).length} history entries for ${userID}!`);
                return response;
            })
            .catch(error => {
                if (dot) { dot.className = 'dot offline';
                    text.textContent = '❌ Sync failed'; }
                console.error('GitHub sync error:', error);
                showToast('❌ Sync failed: ' + error.message + '\nCheck your GitHub settings.');
            });
        };

        // ============================================================
        // MODIFIED INIT TO CHECK LOGIN
        // ============================================================
        const originalInit = init;
        
        init = function() {
            loadData();
            
            // Check if user is already logged in
            if (authUserID && appData.github && appData.github.username && appData.github.repo && appData.github.token) {
                document.getElementById('loginOverlay').classList.add('hidden');
                loadUserData(authUserID);
            } else {
                // Check if GitHub is configured
                if (appData.github && appData.github.username && appData.github.repo && appData.github.token) {
                    // Show login
                    document.getElementById('loginOverlay').classList.remove('hidden');
                } else {
                    // Show login with hint
                    document.getElementById('loginOverlay').classList.remove('hidden');
                    document.getElementById('githubHint').style.display = 'block';
                    document.getElementById('loginSubtitle').textContent = '⚠️ Please set up GitHub in Settings first';
                }
            }
            
            // Initialize app
            appData.sheets.forEach(sheet => {
                if (!appData.taskAllocations[sheet.name] || Object.keys(appData.taskAllocations[sheet.name]).length === 0) {
                    appData.taskAllocations[sheet.name] = allocateTasksToDates(sheet);
                }
            });
            saveData();
            
            updateAllSelectors();
            updateFocusDashboard();
            updateSheetTabs();
            renderSpreadsheet();
            updateFocusBattery();
            
            document.getElementById('topTabs').classList.add('hidden');
            document.getElementById('appContent').classList.add('hidden');
            document.getElementById('page-focus').classList.add('active');
            document.getElementById('appContent').classList.remove('hidden');
            document.getElementById('defaultSpeedInput').value = appData.defaultSpeed;
            
            if (appData.github) {
                document.getElementById('githubUsername').value = appData.github.username || '';
                document.getElementById('githubRepo').value = appData.github.repo || '';
                document.getElementById('githubToken').value = appData.github.token || '';
                document.getElementById('githubUserID').value = appData.github.userID || '';
            }
            
            document.getElementById('headerSubtitle').textContent = 'Focus';
            updateGitHubStatus();
            updateDateDisplay();
            updateHistory();
            updateExecuteButton();
            updateStatusDot();
            updateThreeBatteries();
            updateHorizBatteries();
            checkDailySync();
            
            // Auto-login if possible
            if (authUserID && appData.github && appData.github.username && appData.github.repo && appData.github.token) {
                document.getElementById('loginOverlay').classList.add('hidden');
            }
        };

        // ============================================================
        // START APP
        // ============================================================
        // Make sure all functions are defined before calling init
        // The actual init call is at the end of the script
    </script>
</body>
</html>
