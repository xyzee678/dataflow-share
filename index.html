<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Course Scheduler · Mobile</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fb;
      padding: 12px 10px 80px 10px;
      min-height: 100vh;
      color: #1e293b;
    }
    .app {
      max-width: 580px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tab-bar {
      display: flex;
      gap: 6px;
      background: #e9edf4;
      padding: 5px;
      border-radius: 40px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 0;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #334155;
      transition: 0.2s;
      cursor: pointer;
    }
    .tab-btn.active {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      color: #0f172a;
    }
    .section {
      background: white;
      border-radius: 28px;
      padding: 18px 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      margin-bottom: 12px;
      border: 1px solid #eef2f6;
    }
    .section-title {
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .label {
      font-weight: 500;
      font-size: 0.85rem;
      color: #475569;
      margin-top: 10px;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d9e6;
      border-radius: 18px;
      font-size: 0.95rem;
      background: #fafcff;
      transition: 0.15s;
      margin-bottom: 6px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
      font-family: monospace;
    }
    .btn {
      background: #eef2f6;
      border: none;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1e293b;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 4px 4px 4px 0;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: #0f172a;
      color: white;
    }
    .btn-primary:active { opacity: 0.7; }
    .btn-outline { background: white; border-color: #d1d9e6; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .flex { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
    .mt-2 { margin-top: 12px; }
    .mb-1 { margin-bottom: 6px; }
    .course-select { margin: 6px 0 12px 0; }
    .lecture-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
      border-bottom: 1px solid #f1f5f9;
      gap: 4px;
    }
    .lecture-item .name { flex: 1; font-size: 0.95rem; }
    .lecture-item .dur { color: #475569; font-size: 0.8rem; white-space: nowrap; }
    .lecture-item .status { margin-left: 6px; }
    .row-green { background: #dcfce7; border-radius: 20px; padding: 2px 8px; }
    .row-red { background: #fee2e2; border-radius: 20px; padding: 2px 8px; }
    .checkbox-large {
      width: 22px; height: 22px; accent-color: #0f172a;
      transform: scale(1.1);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin: 10px 0;
    }
    .cal-day {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      font-size: 0.85rem;
      background: #f8fafc;
      border: 1px solid #e9edf4;
      cursor: pointer;
      font-weight: 500;
      transition: 0.05s;
    }
    .cal-day.has-event { background: #dbeafe; border-color: #93b4e8; }
    .cal-day.today { border: 2px solid #0f172a; background: #e9edf4; }
    .cal-day.selected { background: #0f172a; color: white; }
    .cal-day.empty { background: transparent; border: none; cursor: default; }
    .cal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 6px 0;
    }
    .month-label { font-weight: 600; font-size: 1.1rem; }
    .badge {
      background: #e9edf4;
      border-radius: 40px;
      padding: 2px 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .backup-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 6px; }
    hr { margin: 16px 0; border: 1px solid #eef2f6; }
    .mt-1 { margin-top: 6px; }
    .text-muted { color: #64748b; font-size: 0.85rem; }
    .dummy-row { background: #f1f5f9; border-radius: 40px; padding: 8px 14px; margin: 6px 0; }
  </style>
</head>
<body>
<div class="app" id="app">
  <h1>📚 Course Scheduler</h1>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="upload">Upload</button>
    <button class="tab-btn" data-tab="timetable">Timetable</button>
    <button class="tab-btn" data-tab="edit">Edit Data</button>
  </div>

  <!-- UPLOAD -->
  <div id="upload-section" class="section">
    <div class="section-title">📤 Upload</div>
    <div class="label">Course name</div>
    <input id="courseNameInput" placeholder="e.g. Mathematics 101" value="Demo Course">
    <div class="label">Paste lecture data (sr_no, lecture, duration_mins) </div>
    <textarea id="rawDataInput" placeholder="1, Intro, 25&#10;2, Basics, 40&#10;3, Advanced, 90">1, Intro, 25
2, Basics, 40
3, Advanced, 90</textarea>
    <div class="flex mt-1">
      <button class="btn btn-primary" id="uploadBtn">📥 Upload Course</button>
      <button class="btn btn-outline" id="dummyBtn">🎲 Dummy Data</button>
    </div>
    <div id="uploadStatus" class="text-muted mt-1">Ready</div>
    <hr>
    <div class="label">Saved courses</div>
    <select id="savedCoursesSelect" class="course-select"></select>
    <div class="flex">
      <button class="btn btn-sm btn-outline" id="deleteCourseBtn">🗑 Delete selected</button>
    </div>
  </div>

  <!-- TIMETABLE -->
  <div id="timetable-section" class="section" style="display:none">
    <div class="section-title">📅 Timetable</div>
    <div class="label">Select course</div>
    <select id="ttCourseSelect" class="course-select"></select>
    <div class="cal-nav">
      <button class="btn btn-sm btn-outline" id="prevMonthBtn">◀</button>
      <span class="month-label" id="monthLabel">June 2026</span>
      <button class="btn btn-sm btn-outline" id="nextMonthBtn">▶</button>
      <button class="btn btn-sm btn-outline" id="todayBtn">Today</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div id="selectedDateLabel" class="text-muted mt-1">Select a date</div>
    <div id="dayLecturesList" class="mt-1"></div>
    <div class="flex mt-1">
      <button class="btn btn-sm btn-outline" id="prevDateBtn">◀ Prev day</button>
      <button class="btn btn-sm btn-outline" id="nextDateBtn">Next day ▶</button>
    </div>
  </div>

  <!-- EDIT DATA -->
  <div id="edit-section" class="section" style="display:none">
    <div class="section-title">✏️ Edit Data</div>
    <div class="label">Select course</div>
    <select id="editCourseSelect" class="course-select"></select>
    <div class="flex">
      <div class="label" style="margin:0">Speed (mins/day)</div>
      <input type="number" id="editSpeedInput" value="120" style="width:100px; margin-left:8px;">
      <button class="btn btn-sm btn-primary" id="setSpeedBtn">Set</button>
      <button class="btn btn-sm btn-outline" id="resetSpeedBtn">Reset</button>
    </div>
    <div class="mt-1">
      <div><span class="badge">Start date</span> <input type="date" id="editStartDateInput" style="width:auto; display:inline-block; padding:6px 10px;"></div>
    </div>
    <div id="editLectureList" class="mt-1"></div>
    <div class="flex mt-1">
      <button class="btn btn-sm btn-outline" id="deleteCourseEditBtn">🗑 Delete course</button>
    </div>
  </div>

  <!-- BACKUP / IMPORT -->
  <div class="section" style="background:#fafcff;">
    <div class="flex" style="justify-content:space-between;">
      <span class="label" style="margin:0">💾 Backup / Restore</span>
    </div>
    <div class="backup-row">
      <button class="btn btn-sm btn-outline" id="exportBtn">⬇ Export JSON</button>
      <button class="btn btn-sm btn-outline" id="importBtn">⬆ Import JSON</button>
      <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>
    <div id="backupStatus" class="text-muted">All data saved automatically</div>
  </div>
</div>
<script>
  (function(){
    // ----- DATA LAYER -----
    const STORAGE_KEY = 'courseSchedulerData';
    let appData = {
      courses: {},          // courseName -> { lectures: [{sr, name, duration}], speed: 120, startDate: '2026-06-01', progress: {} }
    };
    let currentTab = 'upload';
    let selectedCourse = '';
    let viewDate = new Date(); // for calendar
    let selectedDate = new Date();

    // helpers
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { appData = JSON.parse(raw); } catch(e){ appData = { courses: {} }; }
      } else {
        // default dummy
        appData = { courses: {} };
        // add dummy courses
        addDummyCourse('Math 101', [
          {sr:1, name:'Algebra', duration:35},
          {sr:2, name:'Geometry', duration:50},
          {sr:3, name:'Trig', duration:80},
          {sr:4, name:'Calculus', duration:120},
          {sr:5, name:'Stats', duration:30},
        ], 120, '2026-06-01');
        addDummyCourse('Physics 1', [
          {sr:1, name:'Kinematics', duration:45},
          {sr:2, name:'Dynamics', duration:60},
          {sr:3, name:'Waves', duration:90},
          {sr:4, name:'Thermodynamics', duration:70},
        ], 90, '2026-06-05');
        saveData();
      }
      // ensure each course has progress, speed, startDate
      Object.keys(appData.courses).forEach(c => {
        const course = appData.courses[c];
        if (!course.speed) course.speed = 120;
        if (!course.startDate) course.startDate = new Date().toISOString().slice(0,10);
        if (!course.progress) course.progress = {};
        if (!course.lectures) course.lectures = [];
      });
    }

    function addDummyCourse(name, lectures, speed, startDate) {
      appData.courses[name] = {
        lectures: lectures,
        speed: speed || 120,
        startDate: startDate || new Date().toISOString().slice(0,10),
        progress: {}
      };
    }

    // ----- core logic: group lectures into days -----
    function buildSchedule(courseName) {
      const course = appData.courses[courseName];
      if (!course) return [];
      const speed = course.speed || 120;
      const lectures = course.lectures || [];
      const progress = course.progress || {};
      let schedule = []; // array of {dayIndex, date, lectures: [{sr, name, duration, done}]}
      let currentDay = 0;
      let remainingInDay = speed;
      let dayLectures = [];
      const startDate = new Date(course.startDate + 'T00:00:00');
      
      lectures.forEach((lec, idx) => {
        let dur = lec.duration || 0;
        while (dur > 0) {
          if (remainingInDay <= 0) {
            // push day
            if (dayLectures.length) {
              const date = new Date(startDate);
              date.setDate(date.getDate() + currentDay);
              schedule.push({
                dayIndex: currentDay,
                date: date.toISOString().slice(0,10),
                lectures: dayLectures.slice()
              });
              dayLectures = [];
              currentDay++;
              remainingInDay = speed;
            } else {
              // edge: remainingInDay == 0 and no lectures
              remainingInDay = speed;
              currentDay++;
            }
            continue;
          }
          // how much of this lecture fits?
          const take = Math.min(dur, remainingInDay);
          const done = progress[lec.sr] || false;
          dayLectures.push({
            sr: lec.sr,
            name: lec.name,
            duration: lec.duration,
            partDuration: take,
            done: done,
            isContinuation: (dayLectures.length > 0 && dayLectures[dayLectures.length-1].sr === lec.sr)
          });
          dur -= take;
          remainingInDay -= take;
          if (remainingInDay <= 0) {
            // push day
            const date = new Date(startDate);
            date.setDate(date.getDate() + currentDay);
            schedule.push({
              dayIndex: currentDay,
              date: date.toISOString().slice(0,10),
              lectures: dayLectures.slice()
            });
            dayLectures = [];
            currentDay++;
            remainingInDay = speed;
          }
        }
      });
      // flush remaining
      if (dayLectures.length) {
        const date = new Date(startDate);
        date.setDate(date.getDate() + currentDay);
        schedule.push({
          dayIndex: currentDay,
          date: date.toISOString().slice(0,10),
          lectures: dayLectures.slice()
        });
      }
      return schedule;
    }

    // ----- render functions -----
    function renderCourseSelects() {
      const names = Object.keys(appData.courses);
      const selects = ['savedCoursesSelect', 'ttCourseSelect', 'editCourseSelect'];
      selects.forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const current = sel.value;
        sel.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
        if (names.includes(current)) sel.value = current;
        else if (names.length) sel.value = names[0];
        else sel.innerHTML = '<option value="">No courses</option>';
      });
      // set selectedCourse
      const mainSel = document.getElementById('savedCoursesSelect');
      if (mainSel && mainSel.value) selectedCourse = mainSel.value;
    }

    function renderUploadStatus(msg) {
      document.getElementById('uploadStatus').innerText = msg;
    }

    // timetable
    function renderCalendar(courseName) {
      const grid = document.getElementById('calendarGrid');
      const monthLabel = document.getElementById('monthLabel');
      if (!courseName || !appData.courses[courseName]) {
        grid.innerHTML = '<div class="text-muted">Select a course</div>';
        return;
      }
      const schedule = buildSchedule(courseName);
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      monthLabel.innerText = new Date(year, month).toLocaleString('default', { month:'long', year:'numeric' });
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const todayStr = new Date().toISOString().slice(0,10);
      
      let html = '';
      // empty days
      for (let i=0; i<firstDay; i++) html += '<div class="cal-day empty"></div>';
      
      for (let d=1; d<=daysInMonth; d++) {
        const dateObj = new Date(year, month, d);
        const dateStr = dateObj.toISOString().slice(0,10);
        const hasEvent = schedule.some(day => day.date === dateStr);
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate.toISOString().slice(0,10);
        let cls = 'cal-day';
        if (hasEvent) cls += ' has-event';
        if (isToday) cls += ' today';
        if (isSelected) cls += ' selected';
        html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
      }
      grid.innerHTML = html;
      
      // attach click
      grid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
        el.addEventListener('click', function() {
          const dateStr = this.dataset.date;
          if (dateStr) {
            selectedDate = new Date(dateStr + 'T00:00:00');
            renderDayLectures(courseName, dateStr);
            renderCalendar(courseName);
          }
        });
      });
      
      // also show selected date lectures
      const selDateStr = selectedDate.toISOString().slice(0,10);
      renderDayLectures(courseName, selDateStr);
    }

    function renderDayLectures(courseName, dateStr) {
      const container = document.getElementById('dayLecturesList');
      const label = document.getElementById('selectedDateLabel');
      if (!courseName || !appData.courses[courseName]) {
        container.innerHTML = '';
        label.innerText = 'No course selected';
        return;
      }
      label.innerText = `📅 ${dateStr}`;
      const schedule = buildSchedule(courseName);
      const day = schedule.find(d => d.date === dateStr);
      if (!day || !day.lectures.length) {
        container.innerHTML = '<div class="text-muted">No lectures scheduled</div>';
        return;
      }
      let html = '';
      day.lectures.forEach((lec, idx) => {
        const done = lec.done || false;
        const colorClass = done ? 'row-green' : 'row-red';
        const cont = lec.isContinuation ? ' (cont.)' : '';
        html += `
          <div class="lecture-item" data-sr="${lec.sr}" data-date="${dateStr}">
            <span class="name">${lec.name} ${cont}</span>
            <span class="dur">${lec.partDuration}m</span>
            <span class="status ${colorClass}">${done ? '✅' : '⬜'}</span>
            <input type="checkbox" class="checkbox-large" ${done ? 'checked' : ''} data-sr="${lec.sr}" data-date="${dateStr}">
          </div>
        `;
      });
      container.innerHTML = html;
      // attach checkbox
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', function() {
          const sr = parseInt(this.dataset.sr);
          const date = this.dataset.date;
          const course = appData.courses[courseName];
          if (!course) return;
          // find lecture in schedule
          const schedule = buildSchedule(courseName);
          const day = schedule.find(d => d.date === date);
          if (!day) return;
          const lec = day.lectures.find(l => l.sr === sr);
          if (!lec) return;
          // update progress
          const done = this.checked;
          course.progress[lec.sr] = done;
          // also update all occurrences of same sr in other days? we keep per lecture sr.
          // but we want row color update
          saveData();
          renderDayLectures(courseName, date);
          renderCalendar(courseName);
          renderEditLectures(courseName);
        });
      });
    }

    function renderEditLectures(courseName) {
      const container = document.getElementById('editLectureList');
      if (!courseName || !appData.courses[courseName]) {
        container.innerHTML = '<div class="text-muted">Select a course</div>';
        return;
      }
      const course = appData.courses[courseName];
      const speed = course.speed || 120;
      document.getElementById('editSpeedInput').value = speed;
      document.getElementById('editStartDateInput').value = course.startDate || '';
      
      let html = `<div class="label">Lectures (${course.lectures.length})</div>`;
      course.lectures.forEach(lec => {
        const done = course.progress[lec.sr] || false;
        const color = done ? 'row-green' : 'row-red';
        html += `
          <div class="lecture-item">
            <span class="name">#${lec.sr} ${lec.name}</span>
            <span class="dur">${lec.duration}m</span>
            <span class="status ${color}">${done ? '✅' : '⬜'}</span>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // ----- UI actions -----
    function uploadCourse() {
      const name = document.getElementById('courseNameInput').value.trim();
      const raw = document.getElementById('rawDataInput').value;
      if (!name) { renderUploadStatus('⚠️ Enter course name'); return; }
      if (!raw) { renderUploadStatus('⚠️ Paste lecture data'); return; }
      try {
        const lines = raw.split('\n').filter(l => l.trim());
        const lectures = lines.map(line => {
          const parts = line.split(',').map(s => s.trim());
          if (parts.length < 3) throw new Error('Each line: sr_no, lecture_name, duration');
          return { sr: parseInt(parts[0]), name: parts[1], duration: parseInt(parts[2]) };
        });
        if (lectures.some(l => isNaN(l.sr) || isNaN(l.duration))) throw new Error('Invalid number');
        appData.courses[name] = {
          lectures: lectures,
          speed: 120,
          startDate: new Date().toISOString().slice(0,10),
          progress: {}
        };
        saveData();
        renderUploadStatus(`✅ Uploaded "${name}" (${lectures.length} lectures)`);
        refreshAll();
      } catch(e) {
        renderUploadStatus('❌ Error: '+e.message);
      }
    }

    function loadDummy() {
      appData.courses = {};
      addDummyCourse('Math 101', [
        {sr:1, name:'Algebra', duration:35},
        {sr:2, name:'Geometry', duration:50},
        {sr:3, name:'Trig', duration:80},
        {sr:4, name:'Calculus', duration:120},
        {sr:5, name:'Stats', duration:30},
      ], 120, '2026-06-01');
      addDummyCourse('Physics 1', [
        {sr:1, name:'Kinematics', duration:45},
        {sr:2, name:'Dynamics', duration:60},
        {sr:3, name:'Waves', duration:90},
        {sr:4, name:'Thermodynamics', duration:70},
      ], 90, '2026-06-05');
      saveData();
      refreshAll();
      renderUploadStatus('🎲 Dummy courses loaded');
    }

    function refreshAll() {
      renderCourseSelects();
      const course = document.getElementById('ttCourseSelect')?.value || selectedCourse;
      if (course && appData.courses[course]) {
        renderCalendar(course);
        renderEditLectures(course);
      } else {
        const keys = Object.keys(appData.courses);
        if (keys.length) {
          const c = keys[0];
          document.getElementById('ttCourseSelect').value = c;
          document.getElementById('editCourseSelect').value = c;
          renderCalendar(c);
          renderEditLectures(c);
        }
      }
      // sync speed and start date
      const editCourse = document.getElementById('editCourseSelect').value;
      if (editCourse && appData.courses[editCourse]) {
        document.getElementById('editSpeedInput').value = appData.courses[editCourse].speed || 120;
        document.getElementById('editStartDateInput').value = appData.courses[editCourse].startDate || '';
      }
    }

    // ----- export import -----
    function exportData() {
      const json = JSON.stringify(appData, null, 2);
      const blob = new Blob([json], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      document.getElementById('backupStatus').innerText = '⬇ Exported';
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.courses) {
            appData = data;
            saveData();
            refreshAll();
            document.getElementById('backupStatus').innerText = '✅ Imported';
          } else {
            document.getElementById('backupStatus').innerText = '❌ Invalid format';
          }
        } catch(err) {
          document.getElementById('backupStatus').innerText = '❌ Import error';
        }
      };
      reader.readAsText(file);
    }

    // ----- init -----
    function init() {
      loadData();
      
      // tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const tab = this.dataset.tab;
          currentTab = tab;
          document.getElementById('upload-section').style.display = tab === 'upload' ? 'block' : 'none';
          document.getElementById('timetable-section').style.display = tab === 'timetable' ? 'block' : 'none';
          document.getElementById('edit-section').style.display = tab === 'edit' ? 'block' : 'none';
          if (tab === 'timetable') {
            const c = document.getElementById('ttCourseSelect').value;
            if (c) renderCalendar(c);
          }
          if (tab === 'edit') {
            const c = document.getElementById('editCourseSelect').value;
            if (c) renderEditLectures(c);
          }
        });
      });

      // event listeners
      document.getElementById('uploadBtn').addEventListener('click', uploadCourse);
      document.getElementById('dummyBtn').addEventListener('click', loadDummy);
      document.getElementById('deleteCourseBtn').addEventListener('click', function() {
        const sel = document.getElementById('savedCoursesSelect');
        if (sel.value && confirm(`Delete "${sel.value}"?`)) {
          delete appData.courses[sel.value];
          saveData();
          refreshAll();
          renderUploadStatus('🗑 Deleted');
        }
      });
      document.getElementById('deleteCourseEditBtn').addEventListener('click', function() {
        const sel = document.getElementById('editCourseSelect');
        if (sel.value && confirm(`Delete "${sel.value}"?`)) {
          delete appData.courses[sel.value];
          saveData();
          refreshAll();
        }
      });

      document.getElementById('setSpeedBtn').addEventListener('click', function() {
        const c = document.getElementById('editCourseSelect').value;
        if (!c || !appData.courses[c]) return;
        const speed = parseInt(document.getElementById('editSpeedInput').value);
        if (isNaN(speed) || speed < 1) return alert('Enter valid speed');
        appData.courses[c].speed = speed;
        saveData();
        refreshAll();
      });
      document.getElementById('resetSpeedBtn').addEventListener('click', function() {
        const c = document.getElementById('editCourseSelect').value;
        if (!c || !appData.courses[c]) return;
        appData.courses[c].speed = 120;
        document.getElementById('editSpeedInput').value = 120;
        saveData();
        refreshAll();
      });
      document.getElementById('editStartDateInput').addEventListener('change', function() {
        const c = document.getElementById('editCourseSelect').value;
        if (!c || !appData.courses[c]) return;
        appData.courses[c].startDate = this.value;
        saveData();
        refreshAll();
      });

      // calendar nav
      document.getElementById('prevMonthBtn').addEventListener('click', function() {
        viewDate.setMonth(viewDate.getMonth()-1);
        const c = document.getElementById('ttCourseSelect').value;
        if (c) renderCalendar(c);
      });
      document.getElementById('nextMonthBtn').addEventListener('click', function() {
        viewDate.setMonth(viewDate.getMonth()+1);
        const c = document.getElementById('ttCourseSelect').value;
        if (c) renderCalendar(c);
      });
      document.getElementById('todayBtn').addEventListener('click', function() {
        viewDate = new Date();
        selectedDate = new Date();
        const c = document.getElementById('ttCourseSelect').value;
        if (c) renderCalendar(c);
      });
      document.getElementById('prevDateBtn').addEventListener('click', function() {
        selectedDate.setDate(selectedDate.getDate()-1);
        const c = document.getElementById('ttCourseSelect').value;
        if (c) renderCalendar(c);
      });
      document.getElementById('nextDateBtn').addEventListener('click', function() {
        selectedDate.setDate(selectedDate.getDate()+1);
        const c = document.getElementById('ttCourseSelect').value;
        if (c) renderCalendar(c);
      });

      // course select sync
      document.getElementById('savedCoursesSelect').addEventListener('change', function() {
        selectedCourse = this.value;
        document.getElementById('ttCourseSelect').value = this.value;
        document.getElementById('editCourseSelect').value = this.value;
        if (this.value) renderCalendar(this.value);
        renderEditLectures(this.value);
      });
      document.getElementById('ttCourseSelect').addEventListener('change', function() {
        document.getElementById('savedCoursesSelect').value = this.value;
        document.getElementById('editCourseSelect').value = this.value;
        if (this.value) renderCalendar(this.value);
      });
      document.getElementById('editCourseSelect').addEventListener('change', function() {
        document.getElementById('savedCoursesSelect').value = this.value;
        document.getElementById('ttCourseSelect').value = this.value;
        if (this.value) renderEditLectures(this.value);
        refreshAll();
      });

      // export import
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('importBtn').addEventListener('click', function() {
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', function(e) {
        if (this.files.length) importData(this.files[0]);
        this.value = '';
      });

      // initial render
      refreshAll();
      // show upload tab
      document.querySelector('.tab-btn[data-tab="upload"]').click();
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
</body>
</html>
